<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Vibe Check // Sus-Domain Sniffer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #0f172a; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline Icon Components (Zero Dependency) ---
        const Icon = ({ children, className, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" 
                height="24" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
                {...props}
            >
                {children}
            </svg>
        );

        const ShieldAlert = (props) => (
            <Icon {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="M12 8v4" /><path d="M12 16h.01" /></Icon>
        );
        const Globe = (props) => (
            <Icon {...props}><circle cx="12" cy="12" r="10" /><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" /><path d="M2 12h20" /></Icon>
        );
        const MapPin = (props) => (
            <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></Icon>
        );
        const Server = (props) => (
            <Icon {...props}><rect width="20" height="8" x="2" y="2" rx="2" ry="2" /><rect width="20" height="8" x="2" y="14" rx="2" ry="2" /><line x1="6" x2="6.01" y1="6" y2="6" /><line x1="6" x2="6.01" y1="18" y2="18" /></Icon>
        );
        const ExternalLink = (props) => (
            <Icon {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></Icon>
        );
        const Copy = (props) => (
            <Icon {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></Icon>
        );
        const Terminal = (props) => (
            <Icon {...props}><polyline points="4 17 10 11 4 5" /><line x1="12" x2="20" y1="19" y2="19" /></Icon>
        );
        const Wifi = (props) => (
            <Icon {...props}><path d="M5 12.55a11 11 0 0 1 14.08 0" /><path d="M1.42 9a16 16 0 0 1 21.16 0" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" x2="12.01" y1="20" y2="20" /></Icon>
        );
        const AlertTriangle = (props) => (
            <Icon {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></Icon>
        );

        const App = () => {
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);

            // Helper to determine if input is IP or Domain
            const isIP = (str) => {
                const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
                return ipRegex.test(str);
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!input) return;
                
                setLoading(true);
                setError(null);
                setData(null);

                let targetIP = input.trim();
                let dnsData = null;

                try {
                    // Step 1: If Domain, Resolve it first (DNS-over-HTTPS)
                    if (!isIP(targetIP)) {
                        // Remove protocol if present
                        targetIP = targetIP.replace(/(^\w+:|^)\/\//, '');
                        
                        // Using Google DNS API
                        const dnsRes = await fetch(`https://dns.google/resolve?name=${targetIP}&type=A`);
                        const dnsJson = await dnsRes.json();
                        
                        if (dnsJson.Answer && dnsJson.Answer.length > 0) {
                            // Find the first A record
                            const aRecord = dnsJson.Answer.find(r => r.type === 1);
                            if (aRecord) {
                                targetIP = aRecord.data;
                                dnsData = dnsJson.Answer.map(r => r.data).join(', ');
                            } else {
                                throw new Error("No A record found for this domain, fam.");
                            }
                        } else {
                            throw new Error("DNS resolution failed. Domain might be ghosting us.");
                        }
                    }

                    // Step 2: Get Geo/ISP Data
                    // Using ipwho.is (Free, no-CORS needed usually)
                    const geoRes = await fetch(`https://ipwho.is/${targetIP}`);
                    const geoJson = await geoRes.json();

                    if (!geoJson.success) {
                        throw new Error(geoJson.message || "Could not fetch IP details.");
                    }

                    const resultData = {
                        originalInput: input,
                        ip: targetIP,
                        isDomain: !isIP(input),
                        dns: dnsData,
                        ...geoJson
                    };

                    setData(resultData);

                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    
                    {/* Header */}
                    <div className="w-full max-w-4xl mb-8 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="p-3 bg-blue-600 rounded-lg shadow-lg shadow-blue-500/20">
                                <ShieldAlert className="w-8 h-8 text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-white tracking-tight">IP Vibe Check</h1>
                                <p className="text-slate-400 text-sm">OSINT Dashboard for MSP Legends</p>
                            </div>
                        </div>
                        <div className="hidden md:block text-right">
                            <div className="text-xs text-slate-500">ENGINEER STATUS</div>
                            <div className="text-green-400 font-bold flex items-center gap-2 justify-end">
                                <span className="relative flex h-2 w-2">
                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                </span>
                                ONLINE
                            </div>
                        </div>
                    </div>

                    {/* Search Bar */}
                    <div className="w-full max-w-2xl relative mb-12">
                        <form onSubmit={handleSearch} className="relative z-10">
                            <div className="relative group">
                                <div className="absolute -inset-0.5 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-30 group-hover:opacity-75 transition duration-1000"></div>
                                <div className="relative flex bg-slate-900 rounded-xl p-2 border border-slate-700">
                                    <div className="flex items-center pl-4 text-slate-400">
                                        <Terminal className="w-5 h-5" />
                                    </div>
                                    <input
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        placeholder="Enter IP (8.8.8.8) or Domain (sus-site.com)"
                                        className="w-full bg-transparent text-white p-4 focus:outline-none placeholder-slate-500 font-mono"
                                    />
                                    <button 
                                        type="submit"
                                        disabled={loading}
                                        className="bg-blue-600 hover:bg-blue-500 text-white px-8 rounded-lg font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                                    >
                                        {loading ? 'Cooking...' : 'Scan'}
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    {/* Error State */}
                    {error && (
                        <div className="w-full max-w-4xl mb-8 p-4 bg-red-500/10 border border-red-500/50 rounded-xl flex items-center gap-4 text-red-200 animate-in fade-in slide-in-from-bottom-4">
                            <AlertTriangle className="w-6 h-6" />
                            <div>
                                <p className="font-bold">Big Oof. Scan Failed.</p>
                                <p className="text-sm opacity-80">{error}</p>
                            </div>
                        </div>
                    )}

                    {/* Results Dashboard */}
                    {data && (
                        <div className="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-8 duration-500">
                            
                            {/* Main Info Card */}
                            <div className="lg:col-span-2 space-y-6">
                                {/* Identity Card */}
                                <div className="glass-panel rounded-2xl p-6 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10">
                                        <Server className="w-32 h-32" />
                                    </div>
                                    
                                    <div className="relative z-10">
                                        <div className="flex items-start justify-between mb-6">
                                            <div>
                                                <div className="text-xs font-bold text-blue-400 mb-1 uppercase tracking-wider">Target Acquired</div>
                                                <div className="text-3xl font-bold text-white font-mono flex items-center gap-3">
                                                    {data.ip}
                                                    <button onClick={() => copyToClipboard(data.ip)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors group">
                                                        <Copy className="w-4 h-4 text-slate-500 group-hover:text-white" />
                                                    </button>
                                                </div>
                                                {data.isDomain && (
                                                    <div className="mt-2 text-slate-400 text-sm flex items-center gap-2">
                                                        <span className="bg-slate-800 px-2 py-1 rounded text-xs border border-slate-700">Resolved from</span>
                                                        {data.originalInput}
                                                    </div>
                                                )}
                                            </div>
                                            <img 
                                                src={data.flag.img} 
                                                alt={data.country} 
                                                className="w-16 h-auto rounded shadow-lg"
                                            />
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <InfoItem label="ISP / Org" value={data.connection.isp} icon={<Wifi className="w-4 h-4" />} />
                                            <InfoItem label="ASN" value={`AS${data.connection.asn}`} icon={<Server className="w-4 h-4" />} />
                                            <InfoItem label="Location" value={`${data.city}, ${data.region}`} icon={<MapPin className="w-4 h-4" />} />
                                            <InfoItem label="Timezone" value={`UTC ${data.timezone.utc}`} icon={<Globe className="w-4 h-4" />} />
                                        </div>
                                    </div>
                                </div>

                                {/* Network Details */}
                                <div className="glass-panel rounded-2xl p-6">
                                    <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                        <Terminal className="w-5 h-5 text-purple-400" />
                                        Network Intel
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center p-3 bg-slate-800/50 rounded-lg border border-slate-700/50">
                                            <span className="text-slate-400">Route Range</span>
                                            <span className="text-white font-mono">{data.connection.range || 'Unknown'}</span>
                                        </div>
                                        <div className="flex justify-between items-center p-3 bg-slate-800/50 rounded-lg border border-slate-700/50">
                                            <span className="text-slate-400">Domain Extension</span>
                                            <span className="text-white font-mono">{data.connection.domain || 'N/A'}</span>
                                        </div>
                                        {data.dns && (
                                            <div className="p-3 bg-slate-800/50 rounded-lg border border-slate-700/50">
                                                <span className="text-slate-400 block mb-1 text-xs">DNS Resolution Path</span>
                                                <span className="text-green-400 font-mono text-sm">{data.dns}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Actions / External Tools */}
                            <div className="lg:col-span-1 space-y-4">
                                <div className="p-1 rounded-2xl bg-gradient-to-b from-slate-700 to-slate-800">
                                    <div className="bg-slate-900 rounded-xl p-5 h-full">
                                        <h3 className="text-lg font-bold text-white mb-1">Vibe Check</h3>
                                        <p className="text-xs text-slate-500 mb-6">Launch external investigations</p>
                                        
                                        <div className="space-y-3">
                                            <ExternalTool 
                                                name="VirusTotal" 
                                                desc="Check for malware/flags"
                                                url={`https://www.virustotal.com/gui/${data.isDomain ? 'domain' : 'ip-address'}/${data.isDomain ? data.originalInput : data.ip}`}
                                                color="hover:border-blue-500 hover:text-blue-400"
                                            />
                                            <ExternalTool 
                                                name="AbuseIPDB" 
                                                desc="Report history check"
                                                url={`https://www.abuseipdb.com/check/${data.ip}`}
                                                color="hover:border-orange-500 hover:text-orange-400"
                                            />
                                            <ExternalTool 
                                                name="Talos Intel" 
                                                desc="Cisco reputation data"
                                                url={`https://talosintelligence.com/reputation_center/lookup?search=${data.ip}`}
                                                color="hover:border-teal-500 hover:text-teal-400"
                                            />
                                            <ExternalTool 
                                                name="Shodan" 
                                                desc="Open ports & OSINT"
                                                url={`https://www.shodan.io/host/${data.ip}`}
                                                color="hover:border-red-500 hover:text-red-400"
                                            />
                                            {data.isDomain && (
                                                <ExternalTool 
                                                    name="Urlscan.io" 
                                                    desc="Visual site scan"
                                                    url={`https://urlscan.io/search/#${data.originalInput}`}
                                                    color="hover:border-green-500 hover:text-green-400"
                                                />
                                            )}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-4 rounded-xl border border-slate-700 bg-slate-800/30 text-center">
                                    <p className="text-xs text-slate-500">
                                        Lat: {data.latitude} | Long: {data.longitude}
                                    </p>
                                    <a 
                                        href={`https://www.google.com/maps/search/?api=1&query=${data.latitude},${data.longitude}`}
                                        target="_blank"
                                        rel="noreferrer"
                                        className="text-xs text-blue-400 hover:underline mt-1 inline-block"
                                    >
                                        View on Maps
                                    </a>
                                </div>
                            </div>

                        </div>
                    )}

                    {!data && !loading && (
                        <div className="text-center text-slate-600 mt-12 animate-in fade-in zoom-in duration-700">
                            <Server className="w-16 h-16 mx-auto mb-4 opacity-20" />
                            <p>Ready to hunt. Input a target above.</p>
                        </div>
                    )}
                </div>
            );
        };

        const InfoItem = ({ label, value, icon }) => (
            <div className="p-3 bg-slate-800/50 rounded-lg border border-slate-700/50 hover:bg-slate-800 transition-colors">
                <div className="flex items-center gap-2 text-slate-400 text-xs uppercase tracking-wider mb-1">
                    {icon}
                    {label}
                </div>
                <div className="text-white font-medium truncate" title={value}>{value || 'Unknown'}</div>
            </div>
        );

        const ExternalTool = ({ name, desc, url, color }) => (
            <a 
                href={url} 
                target="_blank" 
                rel="noreferrer"
                className={`flex items-center justify-between p-3 rounded-lg border border-slate-700 bg-slate-800/40 group transition-all duration-300 hover:bg-slate-800 ${color}`}
            >
                <div>
                    <div className="font-bold text-sm text-slate-200 group-hover:text-white transition-colors">{name}</div>
                    <div className="text-xs text-slate-500">{desc}</div>
                </div>
                <ExternalLink className="w-4 h-4 text-slate-600 group-hover:text-white transition-colors" />
            </a>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
